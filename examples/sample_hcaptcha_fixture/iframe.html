<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Main content of the hCaptcha challenge</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .hcaptcha-challenge {
      width: 320px;
      border: 1px solid #d3d3d3;
      background: #00838f;
      color: #fff;
    }
    .prompt-text {
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.3;
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #fff;
      gap: 1px;
      padding: 1px;
    }
    .task {
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #b2dfdb 0%, #00acc1 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #003a40;
      font-weight: 600;
      user-select: none;
    }
    .task.selected {
      outline: 4px solid #006064;
      outline-offset: -4px;
    }
    .hc-footer {
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px;
      background: #fff;
    }
    .button-submit {
      background: #00acc1;
      color: #fff;
      border: 0;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="hcaptcha-challenge">
    <div class="prompt-text">
      Please click each image containing a <strong>bicycle</strong>
    </div>
    <div class="task-grid">
      <div class="task" data-index="0">0</div>
      <div class="task" data-index="1">1</div>
      <div class="task" data-index="2">2</div>
      <div class="task" data-index="3">3</div>
      <div class="task" data-index="4">4</div>
      <div class="task" data-index="5">5</div>
      <div class="task" data-index="6">6</div>
      <div class="task" data-index="7">7</div>
      <div class="task" data-index="8">8</div>
    </div>
    <div class="hc-footer">
      <button class="button-submit" type="button">Verify</button>
    </div>
  </div>

  <script>
    // Toggle a `.selected` class on click — purely cosmetic, but it
    // lets a human eyeballing the fixture confirm the clicks landed.
    for (const cell of document.querySelectorAll(".task-grid .task")) {
      cell.addEventListener("click", () => cell.classList.toggle("selected"));
    }
    // Verify → tell the parent to populate the h-captcha-response textarea.
    // The Verify button reads which tiles are selected and posts a
    // message back to the parent. Real hCaptcha uses the same channel
    // (postMessage with a token) — we mirror the shape so the v0.7.1
    // detection logic exercises the same code path against the mock as
    // against a live challenge.
    document.querySelector(".button-submit").addEventListener("click", () => {
      const picked = Array.from(
        document.querySelectorAll(".task-grid .task.selected")
      ).map((el) => Number(el.dataset.index));
      try {
        window.parent.postMessage(
          { type: "fixture-hcaptcha-pass", picked: picked },
          "*"
        );
      } catch (_) { /* sandboxed; the harness probes the textarea directly */ }
    });
  </script>
</body>
</html>
