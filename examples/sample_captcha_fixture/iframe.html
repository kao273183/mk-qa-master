<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>recaptcha challenge expires in two minutes</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .rc-imageselect {
      width: 300px;
      border: 1px solid #d3d3d3;
      background: #4a90e2;
      color: #fff;
    }
    .rc-imageselect-desc {
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.3;
    }
    .rc-imageselect-table {
      border-collapse: collapse;
      background: #fff;
    }
    .rc-imageselect-table td {
      width: 96px;
      height: 96px;
      padding: 0;
      border: 1px solid #fff;
      background: linear-gradient(135deg, #c2dfff 0%, #6daffd 100%);
      cursor: pointer;
      text-align: center;
      vertical-align: middle;
      color: #224;
      font-weight: 600;
      user-select: none;
    }
    .rc-imageselect-table td.selected {
      outline: 4px solid #1b73e8;
      outline-offset: -4px;
    }
    .rc-footer {
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px;
      background: #fff;
    }
    #recaptcha-verify-button {
      background: #1b73e8;
      color: #fff;
      border: 0;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="rc-imageselect">
    <div class="rc-imageselect-desc">
      Select all images with <strong>traffic lights</strong>
    </div>
    <table class="rc-imageselect-table">
      <tr>
        <td data-index="0">0</td><td data-index="1">1</td><td data-index="2">2</td>
      </tr>
      <tr>
        <td data-index="3">3</td><td data-index="4">4</td><td data-index="5">5</td>
      </tr>
      <tr>
        <td data-index="6">6</td><td data-index="7">7</td><td data-index="8">8</td>
      </tr>
    </table>
    <div class="rc-footer">
      <button id="recaptcha-verify-button" class="rc-button-default" type="button">
        Verify
      </button>
    </div>
  </div>

  <script>
    // Toggle a `.selected` class on click — purely cosmetic, but it lets
    // a human eyeballing the fixture confirm the clicks landed.
    for (const td of document.querySelectorAll(".rc-imageselect-table td")) {
      td.addEventListener("click", () => td.classList.toggle("selected"));
    }
    // Verify → tell the parent to populate the g-recaptcha-response textarea.
    document.getElementById("recaptcha-verify-button").addEventListener("click", () => {
      try {
        window.parent.postMessage({ type: "fixture-recaptcha-pass" }, "*");
      } catch (_) { /* sandboxed; the test harness probes the textarea directly */ }
    });
  </script>
</body>
</html>
