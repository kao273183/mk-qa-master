[project]
name = "testbridge-runner"
version = "0.1.0"
description = "TestBridge Runner — universal MCP server for running tests across pytest/Jest/Cypress/Go"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Jack Kao", email = "52775937+kao273183@users.noreply.github.com" }]
keywords = ["mcp", "testing", "qa", "pytest", "playwright", "jest", "cypress", "automation", "testbridge"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "mcp>=1.0.0",
    "playwright>=1.40.0",
    "pytest>=8.0.0",
    "pytest-playwright>=0.4.0",
    "pytest-json-report>=1.5.0",
]

[project.urls]
Homepage = "https://github.com/kao273183/testbridge-runner"
Repository = "https://github.com/kao273183/testbridge-runner"
"TestBridge (main product)" = "https://github.com/kao273183/testbridge"

[project.scripts]
testbridge-runner = "testbridge_runner.server:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/testbridge_runner"]
