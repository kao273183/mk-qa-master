[project]
name = "mk-qa-master"
version = "0.6.3"
description = "MCP server for running tests across pytest / Jest / Cypress / Go test / Maestro / Schemathesis / Newman (web + mobile + native API via OpenAPI + Postman collections), with self-improvement analytics and a bilingual (EN / zh-TW) built-in QA knowledge layer (AI 測試大師)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Jack Kao", email = "52775937+kao273183@users.noreply.github.com" }]
keywords = ["mcp", "testing", "qa", "pytest", "playwright", "jest", "cypress", "maestro", "schemathesis", "newman", "postman", "openapi", "api-testing", "automation", "model-context-protocol"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "mcp>=1.0.0",
    "playwright>=1.40.0",
    "pytest>=8.0.0",
    "pytest-playwright>=0.4.0",
    "pytest-json-report>=1.5.0",
]

[project.optional-dependencies]
# Native API testing via Schemathesis (QA_RUNNER=schemathesis). Optional so
# the base install stays slim; users opt in with `pip install 'mk-qa-master[api]'`.
api = ["schemathesis>=3.0,<4"]

[project.urls]
Homepage = "https://github.com/kao273183/mk-qa-master"
Repository = "https://github.com/kao273183/mk-qa-master"

[project.scripts]
mk-qa-master = "mk_qa_master.server:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_qa_master"]
